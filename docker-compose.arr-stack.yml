#########################
# Centralized Volumes   #
#########################
volumes:
  qbittorrent-config:
  sabnzbd-config:
  sonarr-config:
  prowlarr-config:
  radarr-config:
  jellyfin-config:
  jellyfin-cache:
  seerr-config:
  bazarr-config:
  tdarr-config:
  tailscale-state:

#########################
# Networks              #
#########################
networks:
  arr-stack:
    name: arr-stack
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24
          ip_range: 172.20.0.128/25
          gateway: 172.20.0.1

#########################
# Logging               #
#########################
x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

#########################
# Security Defaults     #
#########################
x-security: &default-security
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL

# LinuxServer.io images use s6-overlay which needs CHOWN/SETUID/SETGID/DAC_OVERRIDE
# to switch users during init. Extend default-security with these caps.
x-security-lsio: &lsio-security
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  cap_add:
    - CHOWN
    - SETUID
    - SETGID
    - DAC_OVERRIDE

#########################
# Services              #
#########################
services:
  # ═══════════════════════════════════════════════════════════════════════════
  # QBITTORRENT - Torrent download client.
  # Access: 172.20.0.17:8085 (via Tailscale)
  # ═══════════════════════════════════════════════════════════════════════════
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:5.1.4
    container_name: qbittorrent
    <<: *lsio-security
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-UTC}
      - WEBUI_PORT=8085
      - WEBUI_USERNAME=${QBIT_USERNAME:-admin}
      - WEBUI_PASSWORD=${QBIT_PASSWORD:-adminadmin}
      - DOCKER_MODS=ghcr.io/vuetorrent/vuetorrent-lsio-mod:latest
    volumes:
      - qbittorrent-config:/config
      - ${MEDIA_ROOT:-/data}:/data
    networks:
      arr-stack:
        ipv4_address: 172.20.0.17
    restart: always
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8085/"]
      interval: 2m
      timeout: 15s
      retries: 4
      start_period: 60s

  # ═══════════════════════════════════════════════════════════════════════════
  # SABNZBD - Usenet download client.
  # Access: 172.20.0.18:8080 (via Tailscale)
  # ═══════════════════════════════════════════════════════════════════════════
  sabnzbd:
    image: lscr.io/linuxserver/sabnzbd:4.5.5
    container_name: sabnzbd
    <<: *lsio-security
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-UTC}
    volumes:
      - sabnzbd-config:/config
      - ${MEDIA_ROOT:-/data}:/data
    networks:
      arr-stack:
        ipv4_address: 172.20.0.18
    restart: always
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/"]
      interval: 3m
      timeout: 15s
      retries: 4
      start_period: 60s

  # ═══════════════════════════════════════════════════════════════════════════
  # SONARR - TV show monitor. Watches for new episodes and sends to download.
  # Access: 172.20.0.10:8989 (via Tailscale)
  # ═══════════════════════════════════════════════════════════════════════════
  sonarr:
    image: lscr.io/linuxserver/sonarr:4.0.17
    container_name: sonarr
    <<: *lsio-security
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-UTC}
    networks:
      arr-stack:
        ipv4_address: 172.20.0.10
    volumes:
      - sonarr-config:/config
      - ${MEDIA_ROOT:-/data}:/data
    restart: always
    logging: *default-logging
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8989/"]
      interval: 2m
      timeout: 15s
      retries: 3
      start_period: 60s

  # ═══════════════════════════════════════════════════════════════════════════
  # PROWLARR - Indexer manager. Finds download sources for Sonarr/Radarr.
  # Access: 172.20.0.19:9696 (via Tailscale)
  # ═══════════════════════════════════════════════════════════════════════════
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:2.3.0
    container_name: prowlarr
    <<: *lsio-security
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-UTC}
    volumes:
      - prowlarr-config:/config
    networks:
      arr-stack:
        ipv4_address: 172.20.0.19
    restart: always
    logging: *default-logging
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9696/"]
      interval: 2m
      timeout: 15s
      retries: 3
      start_period: 60s

  # ═══════════════════════════════════════════════════════════════════════════
  # RADARR - Movie monitor. Watches for new movies and sends to download.
  # Access: 172.20.0.11:7878 (via Tailscale)
  # ═══════════════════════════════════════════════════════════════════════════
  radarr:
    image: lscr.io/linuxserver/radarr:6.1.1
    container_name: radarr
    <<: *lsio-security
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-UTC}
    networks:
      arr-stack:
        ipv4_address: 172.20.0.11
    volumes:
      - radarr-config:/config
      - ${MEDIA_ROOT:-/data}:/data
    restart: always
    logging: *default-logging
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:7878/"]
      interval: 2m
      timeout: 15s
      retries: 3
      start_period: 60s

  # ═══════════════════════════════════════════════════════════════════════════
  # JELLYFIN - Media server. Stream your movies and TV shows like Netflix.
  # Access: 172.20.0.4:8096 (via Tailscale)
  # ═══════════════════════════════════════════════════════════════════════════
  jellyfin:
    image: jellyfin/jellyfin:10.11
    container_name: jellyfin
    <<: *default-security
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
    environment:
      - TZ=${TZ:-UTC}
    devices:
      - /dev/dri:/dev/dri
    group_add:
      - "${RENDER_GROUP_ID:-0}"
    volumes:
      - jellyfin-config:/config
      - jellyfin-cache:/cache
      - ${MEDIA_ROOT:-/data}/media:/data/media
    networks:
      arr-stack:
        ipv4_address: 172.20.0.4
    restart: always
    logging: *default-logging
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8096/health"]
      interval: 1m
      timeout: 30s
      retries: 2
      start_period: 30s

  # ═══════════════════════════════════════════════════════════════════════════
  # SEERR (formerly Jellyseerr) - Request portal. Users request movies/shows here.
  # Access: 172.20.0.8:5055 (via Tailscale)
  # ═══════════════════════════════════════════════════════════════════════════
  seerr:
    image: ghcr.io/seerr-team/seerr:v3.3.0
    init: true
    container_name: seerr
    <<: *default-security
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
    environment:
      - LOG_LEVEL=info
      - TZ=${TZ:-UTC}
      - PORT=5055
    networks:
      arr-stack:
        ipv4_address: 172.20.0.8
    volumes:
      - seerr-config:/app/config
    restart: always
    logging: *default-logging
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:5055/api/v1/status",
        ]
      interval: 2m
      timeout: 10s
      retries: 3
      start_period: 20s

  # ═══════════════════════════════════════════════════════════════════════════
  # BAZARR - Subtitle manager. Automatically downloads subtitles.
  # Access: 172.20.0.9:6767 (via Tailscale)
  # ═══════════════════════════════════════════════════════════════════════════
  bazarr:
    image: lscr.io/linuxserver/bazarr:1.5.6
    container_name: bazarr
    <<: *lsio-security
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-UTC}
    networks:
      arr-stack:
        ipv4_address: 172.20.0.9
    volumes:
      - bazarr-config:/config
      - ${MEDIA_ROOT:-/data}/media:/data/media
    restart: always
    logging: *default-logging
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6767/"]
      interval: 3m
      timeout: 10s
      retries: 2
      start_period: 60s

  # ═══════════════════════════════════════════════════════════════════════════
  # FLARESOLVERR - Cloudflare challenge solver. Helps Prowlarr access
  # Cloudflare-protected indexer sites. No web UI. Used internally by Prowlarr.
  # ═══════════════════════════════════════════════════════════════════════════
  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:v3.4.6
    container_name: flaresolverr
    <<: *default-security
    environment:
      - LOG_LEVEL=info
      - TZ=${TZ:-UTC}
    networks:
      arr-stack:
        ipv4_address: 172.20.0.21
    restart: always
    logging: *default-logging
    healthcheck:
      test:
        [
          "CMD",
          "curl",
          "-sf",
          "-X",
          "POST",
          "-H",
          "Content-Type: application/json",
          "-d",
          '{"cmd":"request.get","url":"http://localhost:8191/","maxTimeout":30000}',
          "http://localhost:8191/v1",
        ]
      interval: 10m
      timeout: 60s
      retries: 2
      start_period: 60s

  # ═══════════════════════════════════════════════════════════════════════════
  # TDARR - Media transcoding. Re-encodes libraries to HEVC/H.265 for savings.
  # Access: 172.20.0.22:8265 (via Tailscale)
  # ═══════════════════════════════════════════════════════════════════════════
  tdarr:
    image: ghcr.io/haveagitgat/tdarr:2.27.02
    container_name: tdarr
    <<: *default-security
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-UTC}
      - TDARR_SERVER_PORT=8265
      - TDARR_WEBUI_PORT=8265
      - TDARR_NODE_NAME=tdarr-node
    # GPU passthrough for hardware-accelerated transcoding (uncomment if available)
    # devices:
    #   - /dev/dri:/dev/dri
    # group_add:
    #   - "${RENDER_GROUP_ID:-0}"
    volumes:
      - tdarr-config:/app/server
      - tdarr-config:/app/configs
      - ${MEDIA_ROOT:-/data}/media:/data/media
    networks:
      arr-stack:
        ipv4_address: 172.20.0.22
    restart: always
    logging: *default-logging
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8265"]
      interval: 2m
      timeout: 15s
      retries: 3
      start_period: 30s

  # ═══════════════════════════════════════════════════════════════════════════
  # TAILSCALE - Private remote access to the internal Docker network.
  # Connects to your Tailscale tailnet so authorised devices can reach
  # containers by internal Docker IPs without any externally-exposed ports.
  # Access: Connect to tailnet, then browse to e.g. http://172.20.0.10:8989
  # ═══════════════════════════════════════════════════════════════════════════
  tailscale:
    image: tailscale/tailscale:v1.98.4
    container_name: tailscale
    hostname: ${TS_HOSTNAME:-arr-stack-nas}
    networks:
      arr-stack:
        ipv4_address: 172.20.0.100
    cap_add:
      - NET_ADMIN
      - NET_RAW
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - tailscale-state:/var/lib/tailscale
    environment:
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=false
      - TS_ACCEPT_DNS=false
      - TS_AUTHKEY=${TS_AUTHKEY:-}
      - TS_EXTRA_ARGS=--advertise-routes=${LAN_SUBNET:-10.10.0.0/24}${TS_EXTRA_ROUTES:+,${TS_EXTRA_ROUTES}} --accept-routes
    healthcheck:
      test: ["CMD", "tailscale", "status", "--peers=false"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ═══════════════════════════════════════════════════════════════════════════
  # CONFIGURATOR - One-shot setup. Creates media dirs and configures services.
  # Run: docker compose up configurator
  # ═══════════════════════════════════════════════════════════════════════════
  configurator:
    build: ./configurator
    container_name: configurator
    profiles: ["setup"]
    <<: *default-security
    environment:
      - QBIT_USERNAME=${QBIT_USERNAME:-admin}
      - QBIT_PASSWORD=${QBIT_PASSWORD:-adminadmin}
    volumes:
      - ${MEDIA_ROOT:-/data}/media:/data/media
      - sonarr-config:/config/sonarr
      - radarr-config:/config/radarr
      - prowlarr-config:/config/prowlarr
      - bazarr-config:/config/bazarr
    networks:
      - arr-stack
    depends_on:
      sonarr:
        condition: service_healthy
      radarr:
        condition: service_healthy
      prowlarr:
        condition: service_healthy
      qbittorrent:
        condition: service_healthy
    restart: "no"
    logging: *default-logging
